piper:
  piper_task_server_node:
    ros__parameters:
      target_pose_topic: /piper/perception/target_pose
      detections_3d_topic: /piper/perception/detections_3d
      grasp_candidates_topic: /piper/grasp_candidates
      control_state_topic: /piper/control/state
      owner_request_topic: /piper/control/owner_request
      base_cmd_vel_topic: /cmd_vel
      # 默认不主动发布 /cmd_vel，避免影响 task1 主导航链路；实机任务编排时再打开。
      publish_base_stop: false
      # 真实机械臂运动前必须由任务编排层确认底盘停稳，或显式打开 publish_base_stop。
      require_base_stop_before_motion: true
      base_stop_confirmed: false
      fake_execution: true
      # 当前真实 MoveIt2/SDK 后端尚未接入；设为 false 时 action 会安全拒绝真实执行。
      real_backend_connected: false
      control_ready_timeout_s: 2.0
      # 真实 pick 必须先完成人工验收的 eye-in-hand 标定；fake_execution=true 时不阻塞冒烟。
      require_hand_eye_calibration_before_pick: true
      hand_eye_calibrated: false
      hand_eye_result_must_exist: true
      hand_eye_result_path: datasets/piper_hand_eye/piper_eye_in_hand.yaml
      default_approach_distance_m: 0.10
      default_gripper_width_m: 0.06
      # 强化学习/学习排序结果默认不接入，后续充分验证后再改为 true。
      use_ranked_grasp_candidates: false
      ranked_grasp_candidates_topic: /piper/learning/grasp_candidates_ranked
