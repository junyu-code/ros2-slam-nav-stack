piper_mobile_manipulation:
  ros__parameters:
    # 该文件记录默认边界：Piper 扩展不自动接入 task1 导航主链路。
    namespace: /piper
    arm_camera_namespace: /piper/arm_camera
    navigation_camera_namespace: /nav_camera
    default_control_backend: moveit
    real_robot_auto_enable: false
    publish_base_stop_by_default: false
    gazebo_enable_piper_arm_arg: enable_piper_arm
    gazebo_enable_piper_arm_default: false
    # 移动操作组合入口默认复用已有整车 TF，避免与 Gazebo/实机 robot_state_publisher 重复。
    launch_start_description_default: false
    standalone_publish_joint_states_default: true
    # 项目侧 MoveIt2 plan-only 配置已就绪；真实执行后端仍未接入。
    moveit_config_ready: true
    moveit_config_package: slam_nav_piper_moveit_config
    moveit_execution_ready: false
    sdk_driver_ready: false
    sdk_driver_package: agx_arm_ros
    sdk_driver_namespace: /piper
    sdk_arm_type: piper
    sdk_effector_type: agx_gripper
    learning_ready: false
    learning_package: slam_nav_piper_learning
    learning_enable_arg: enable_learning
    learning_policy_backend_default: disabled
    learning_ranked_candidates_topic: /piper/learning/grasp_candidates_ranked
