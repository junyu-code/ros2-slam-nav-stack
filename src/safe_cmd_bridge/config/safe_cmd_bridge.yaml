safe_cmd_bridge_node:
  ros__parameters:
    input_topic: /cmd_vel
    output_topic: /cmd_vel_safe

    enable_topic_output: true
    enable_udp_output: false
    enable_fault_stop: true
    fault_topic: /localization_fault
    enable_feedback_watchdog: false
    feedback_topic: /base/odom
    feedback_fault_topic: /base_feedback_fault
    feedback_health_topic: /base_feedback_health
    udp_host: 192.168.123.22
    udp_port: 15000

    max_vx: 0.5
    min_vx: -0.2
    max_vy: 0.3
    min_vy: -0.3
    max_wz: 0.8
    min_wz: -0.8

    max_linear_accel: 0.8
    max_linear_decel: 1.0
    max_angular_accel: 1.0
    max_angular_decel: 1.2

    deadband_v: 0.01
    deadband_w: 0.02
    command_timeout_sec: 0.5
    publish_rate_hz: 30.0
    send_zero_on_shutdown: true
    feedback_timeout_sec: 0.8
    feedback_startup_grace_sec: 3.0
    feedback_stall_timeout_sec: 1.0
    min_command_speed_for_feedback: 0.05
    min_feedback_speed: 0.02

    invert_vx: false
    invert_vy: false
    invert_wz: false
