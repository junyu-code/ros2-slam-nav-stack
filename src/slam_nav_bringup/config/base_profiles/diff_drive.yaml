controller_server:
  ros__parameters:
    FollowPath:
      motion_model: "DiffDrive"
      vx_std: 0.20
      vy_std: 0.0
      wz_std: 0.35
      vx_max: 0.60
      vx_min: -0.25
      vy_max: 0.0
      wz_max: 1.0

local_costmap:
  local_costmap:
    ros__parameters:
      footprint: "[[0.28,0.22],[0.28,-0.22],[-0.28,-0.22],[-0.28,0.22]]"

global_costmap:
  global_costmap:
    ros__parameters:
      footprint: "[[0.28,0.22],[0.28,-0.22],[-0.28,-0.22],[-0.28,0.22]]"

velocity_smoother:
  ros__parameters:
    scale_velocities: true
    max_velocity: [0.60, 0.0, 1.0]
    min_velocity: [-0.25, 0.0, -1.0]
    max_accel: [1.0, 0.0, 1.5]
    max_decel: [-1.0, 0.0, -1.5]
    deadband_velocity: [0.01, 0.0, 0.02]
    velocity_timeout: 0.5

safe_cmd_bridge_node:
  ros__parameters:
    max_vx: 0.60
    min_vx: -0.25
    max_vy: 0.0
    min_vy: 0.0
    max_wz: 1.0
    min_wz: -1.0
    max_linear_accel: 1.0
    max_linear_decel: 1.0
    max_angular_accel: 1.5
    max_angular_decel: 1.5
    deadband_v: 0.01
    deadband_w: 0.02
    command_timeout_sec: 0.5
