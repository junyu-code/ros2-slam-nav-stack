controller_server:
  ros__parameters:
    FollowPath:
      motion_model: "Omni"
      vx_std: 0.25
      vy_std: 0.20
      wz_std: 0.35
      vx_max: 0.75
      vx_min: -0.35
      vy_max: 0.40
      wz_max: 1.35

local_costmap:
  local_costmap:
    ros__parameters:
      footprint: "[[0.28,0.22],[0.28,-0.22],[-0.28,-0.22],[-0.28,0.22]]"

global_costmap:
  global_costmap:
    ros__parameters:
      footprint: "[[0.28,0.22],[0.28,-0.22],[-0.28,-0.22],[-0.28,0.22]]"

velocity_smoother:
  ros__parameters:
    scale_velocities: true
    max_velocity: [0.75, 0.40, 1.35]
    min_velocity: [-0.35, -0.40, -1.35]
    max_accel: [1.8, 1.4, 2.2]
    max_decel: [-1.8, -1.4, -2.2]
    deadband_velocity: [0.01, 0.01, 0.02]
    velocity_timeout: 0.5

safe_cmd_bridge_node:
  ros__parameters:
    max_vx: 0.75
    min_vx: -0.35
    max_vy: 0.40
    min_vy: -0.40
    max_wz: 1.35
    min_wz: -1.35
    max_linear_accel: 1.4
    max_linear_decel: 1.4
    max_angular_accel: 2.2
    max_angular_decel: 2.2
    deadband_v: 0.01
    deadband_w: 0.02
    command_timeout_sec: 0.5
