amcl:
  ros__parameters:
    use_sim_time: true
    base_frame_id: base_footprint
    odom_frame_id: odom
    global_frame_id: map
    scan_topic: /scan
    tf_broadcast: true
    transform_tolerance: 0.2
    set_initial_pose: false
    always_reset_initial_pose: false
    initial_pose:
      x: 0.0
      y: 0.0
      z: 0.0
      yaw: 0.0
    min_particles: 500
    max_particles: 2000
    update_min_d: 0.05
    update_min_a: 0.05
    resample_interval: 1
    laser_model_type: likelihood_field
    laser_min_range: 0.35
    laser_max_range: 20.0
    laser_likelihood_max_dist: 2.0
    max_beams: 60
    alpha1: 0.2
    alpha2: 0.2
    alpha3: 0.2
    alpha4: 0.2
    alpha5: 0.2

