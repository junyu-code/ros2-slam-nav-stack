piper:
  arm_camera_fake_node:
    ros__parameters:
      # 假相机只服务 Piper 冒烟测试，不能 remap 到 /nav_camera。
      frame_id: piper_arm_camera_optical_frame
      width: 320
      height: 240
      depth_mm: 900
      publish_hz: 10.0
      color_image_topic: /piper/arm_camera/color/image_raw
      depth_image_topic: /piper/arm_camera/depth/image_raw
      color_camera_info_topic: /piper/arm_camera/color/camera_info
      depth_camera_info_topic: /piper/arm_camera/depth/camera_info
  target_pose_estimator_node:
    ros__parameters:
      # 机械臂相机必须保持在 /piper/arm_camera 下，不能 remap 到 /nav_camera。
      color_image_topic: /piper/arm_camera/color/image_raw
      depth_image_topic: /piper/arm_camera/depth/image_raw
      depth_camera_info_topic: /piper/arm_camera/depth/camera_info
      target_pose_topic: /piper/perception/target_pose
      detections_2d_topic: /piper/perception/detections_2d
      detections_3d_topic: /piper/perception/detections_3d
      debug_image_topic: /piper/perception/debug_image
      target_frame: piper_base_link
      sample_window_px: 12
      min_depth_m: 0.15
      max_depth_m: 2.5
      publish_empty_detections: true
      publish_debug_image: true
      # 当前用于仿真/冒烟的假检测类别；真实识别网络接入后替换算法，不改 topic 边界。
      synthetic_detection_class_id: center_depth_target
      synthetic_detection_score: 0.50
      synthetic_bbox_size_px: 48.0
      synthetic_bbox_size_m: 0.06
